services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_data_processing
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: data_processing
    ports:
      - "5432:5432"
    volumes:
      - pg_data_processing:/var/lib/postgresql/data
    restart: always

volumes:
  pg_data_processing: