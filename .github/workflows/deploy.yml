name: Test and Push Image to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    needs: run-test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/data_processing_ai-agent:latest
            ghcr.io/${{ github.repository_owner }}/data_processing_ai-agent:v${{ github.run_number }}